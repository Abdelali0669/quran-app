<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متشابهات القرآن الكريم</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;500;600;700&display=swap');

  :root {
    --gold: #b8860b;
    --gold-light: #d4a843;
    --gold-dark: #8b6508;
    --green: #1a4a2e;
    --green-mid: #2d6a4a;
    --green-light: #3d8b5c;
    --cream: #fdf6e3;
    --cream-dark: #f5e9c8;
    --ink: #1a1208;
    --ink-mid: #3d2b0e;
    --border: #c9a227;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Scheherazade New', 'Amiri', serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    direction: rtl;
  }

  /* === HEADER === */
  .app-header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 60%, var(--green-light) 100%);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 15px rgba(0,0,0,0.4);
    border-bottom: 3px solid var(--gold);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    gap: 12px;
  }

  .app-title {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .app-title h1 {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1.2;
    letter-spacing: 0.02em;
  }

  .app-title .subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  .header-ornament {
    width: 50px;
    height: 50px;
    flex-shrink: 0;
  }

  /* === SEARCH === */
  .search-bar {
    padding: 8px 16px 12px;
    display: flex;
    gap: 8px;
  }

  .search-input {
    flex: 1;
    padding: 9px 16px;
    border-radius: 25px;
    border: 2px solid var(--gold);
    background: rgba(255,255,255,0.12);
    color: white;
    font-family: 'Scheherazade New', serif;
    font-size: 1rem;
    outline: none;
    transition: all 0.2s;
  }

  .search-input::placeholder { color: rgba(255,255,255,0.55); }
  .search-input:focus { background: rgba(255,255,255,0.2); border-color: var(--gold-light); }

  .search-btn {
    padding: 9px 18px;
    border-radius: 25px;
    border: none;
    background: var(--gold);
    color: var(--green);
    font-family: 'Scheherazade New', serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .search-btn:hover { background: var(--gold-light); }

  /* === NAV TABS === */
  .nav-tabs {
    display: flex;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .nav-tab {
    flex: 1;
    padding: 9px 4px;
    text-align: center;
    cursor: pointer;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: 'Scheherazade New', serif;
  }

  .nav-tab.active {
    color: var(--gold-light);
    border-bottom: 3px solid var(--gold-light);
    background: rgba(255,255,255,0.08);
  }

  /* === MAIN LAYOUT === */
  .main-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  /* === PANELS === */
  .panel { display: none; }
  .panel.active { display: block; }

  /* === INDEX PANEL === */
  .index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    padding: 4px 0;
  }

  .surah-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.08);
  }

  .surah-card:hover {
    background: var(--cream-dark);
    border-color: var(--gold-dark);
    transform: translateY(-2px);
    box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
  }

  .surah-card.active {
    background: var(--green);
    border-color: var(--gold);
    color: white;
  }

  .surah-num {
    display: inline-block;
    width: 28px;
    height: 28px;
    line-height: 28px;
    border-radius: 50%;
    background: var(--gold);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .surah-card.active .surah-num { background: var(--gold-light); color: var(--green); }

  .surah-name {
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Amiri', serif;
    display: block;
  }

  .surah-page {
    font-size: 0.7rem;
    color: #888;
    margin-top: 3px;
  }

  .surah-card.active .surah-page { color: rgba(255,255,255,0.7); }

  /* === READER PANEL === */
  .reader-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }

  .back-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-family: 'Scheherazade New', serif;
    font-size: 0.9rem;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--green-mid); }

  .reader-surah-name {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--green);
    flex: 1;
    text-align: center;
  }

  /* Ornamental divider */
  .ornament-line {
    text-align: center;
    color: var(--gold);
    font-size: 1.2rem;
    margin: 12px 0;
    letter-spacing: 6px;
  }

  .book-content {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    line-height: 2.2;
    font-size: 1.15rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    white-space: pre-wrap;
    font-family: 'Scheherazade New', serif;
  }

  /* Style the content lines */
  .book-content .section-header {
    color: var(--green);
    font-weight: 700;
    font-size: 1.2rem;
    display: block;
    margin: 16px 0 8px;
    padding: 6px 12px;
    background: var(--cream-dark);
    border-right: 4px solid var(--gold);
    border-radius: 0 8px 8px 0;
  }

  .book-content .verse-line {
    display: block;
    padding: 4px 0;
    color: var(--ink-mid);
  }

  mark {
    background: #ffd54f;
    color: var(--ink);
    border-radius: 3px;
    padding: 1px 3px;
  }

  /* Nav between surahs */
  .reader-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    gap: 10px;
  }

  .nav-surah-btn {
    flex: 1;
    padding: 10px 16px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Scheherazade New', serif;
    font-size: 0.95rem;
    transition: all 0.2s;
    text-align: center;
  }

  .nav-surah-btn:hover { background: var(--green-mid); }
  .nav-surah-btn:disabled { background: #ccc; cursor: default; }
  .nav-surah-btn small { display: block; font-size: 0.75rem; opacity: 0.8; }

  /* === SEARCH RESULTS === */
  .results-count {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--cream-dark);
    border-radius: 8px;
  }

  .result-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 1px 2px 6px rgba(0,0,0,0.06);
  }

  .result-card:hover {
    border-color: var(--gold-dark);
    background: var(--cream-dark);
    transform: translateX(-2px);
  }

  .result-surah {
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 6px;
    font-family: 'Amiri', serif;
  }

  .result-excerpt {
    font-size: 0.95rem;
    color: var(--ink-mid);
    line-height: 1.8;
  }

  /* === BISMILLAH === */
  .bismillah {
    text-align: center;
    font-size: 2rem;
    color: var(--gold-dark);
    font-family: 'Amiri', serif;
    padding: 16px;
    margin-bottom: 4px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
  }

  /* === EMPTY STATE === */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #888;
  }

  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  /* === SVG ORNAMENT === */
  .ornament-svg {
    fill: var(--gold-light);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <svg class="header-ornament" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="28" stroke="#d4a843" stroke-width="1.5" fill="none"/>
      <circle cx="30" cy="30" r="22" stroke="#d4a843" stroke-width="0.8" fill="none"/>
      <path d="M30 8 L33 20 L30 16 L27 20 Z" fill="#d4a843"/>
      <path d="M30 52 L33 40 L30 44 L27 40 Z" fill="#d4a843"/>
      <path d="M8 30 L20 27 L16 30 L20 33 Z" fill="#d4a843"/>
      <path d="M52 30 L40 27 L44 30 L40 33 Z" fill="#d4a843"/>
      <circle cx="30" cy="30" r="5" fill="#d4a843" opacity="0.6"/>
      <path d="M30 2 L31.5 28 L30 25 L28.5 28 Z" fill="#d4a843" opacity="0.4"/>
    </svg>
    <div class="app-title">
      <h1>متشابهات القرآن الكريم</h1>
      <span class="subtitle">٨٠ سورة · ٢٩٠ صفحة</span>
    </div>
    <svg class="header-ornament" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="28" stroke="#d4a843" stroke-width="1.5" fill="none"/>
      <circle cx="30" cy="30" r="22" stroke="#d4a843" stroke-width="0.8" fill="none"/>
      <path d="M30 8 L33 20 L30 16 L27 20 Z" fill="#d4a843"/>
      <path d="M30 52 L33 40 L30 44 L27 40 Z" fill="#d4a843"/>
      <path d="M8 30 L20 27 L16 30 L20 33 Z" fill="#d4a843"/>
      <path d="M52 30 L40 27 L44 30 L40 33 Z" fill="#d4a843"/>
      <circle cx="30" cy="30" r="5" fill="#d4a843" opacity="0.6"/>
    </svg>
  </div>

  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" 
           placeholder="ابحث في متشابهات القرآن..." 
           oninput="handleSearchInput(this.value)"
           onkeypress="if(event.key==='Enter') doSearch()">
    <button class="search-btn" onclick="doSearch()">بحث</button>
  </div>

  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('index')">📋 الفهرس</button>
    <button class="nav-tab" id="readerTab" onclick="showPanel('reader')">📖 القراءة</button>
    <button class="nav-tab" id="searchTab" onclick="showPanel('search')">🔍 نتائج البحث</button>
  </nav>
</header>

<main class="main-content">

  <!-- PANEL: INDEX -->
  <div class="panel active" id="panel-index">
    <div class="bismillah">بسم الله الرحمن الرحيم</div>
    <div class="ornament-line">❧ ✦ ❧</div>
    <div class="index-grid" id="indexGrid"></div>
  </div>

  <!-- PANEL: READER -->
  <div class="panel" id="panel-reader">
    <div class="reader-header">
      <button class="back-btn" onclick="showPanel('index')">↩ الفهرس</button>
      <div class="reader-surah-name" id="readerSurahName">—</div>
    </div>
    <div class="ornament-line">❧ ✦ ❧</div>
    <div class="book-content" id="bookContent"></div>
    <div class="reader-nav">
      <button class="nav-surah-btn" id="prevBtn" onclick="navigateSurah(-1)">
        <small>السورة السابقة</small>
        <span id="prevName">—</span>
      </button>
      <button class="nav-surah-btn" id="nextBtn" onclick="navigateSurah(1)">
        <small>السورة التالية</small>
        <span id="nextName">—</span>
      </button>
    </div>
  </div>

  <!-- PANEL: SEARCH RESULTS -->
  <div class="panel" id="panel-search">
    <div class="results-count" id="resultsCount">أدخل كلمة للبحث</div>
    <div id="searchResults"></div>
  </div>

</main>

وِلِهُ وِللمؤِمِنين ول ِكن اْلنا ِف ِقينُ ال يعلمونُ (٣)) . ُ\nإلى اْل ِدين ِة ليخ\n(يقولون لِئن رجعنا"}, {"id": 63, "name": "التغابن", "startPage": 261, "content": "متشاهبات سُورة\n* (السماوا ِت وألارض) : ُ\nل ش يٍء ق ِدير (٥)) . ُ\nضُ له اْللك وله الحمد وهو على ك\nبح ِللِه ما ِفي السماوا ِتُ وما ِفي ألار\nإليِه اْل ِصير (٨)) . ُ\nق وصوركم فأحسن صوركم و\nبالح\n(خلق السماُوا ِت وألارضُ\nبذا ِت الصدوِ ر (٢)) . ُ\nضُ ويعلمُ ما ت ِسرون وما تعِلنون والله عِليمُ\n(يعلمُ ما ِفي السماوا ِتُ وألار\nبير) : ُ\nبما تعملونُ ب ِصير - خ\n* (والله\nبما تعملون ب ِصيرُ (٢)) . ُ\n(هو ال ِذي خلقكم ف ِمنكم كا ِفر وِمنكم مؤِمن والله\nبيرُ (٣)) . ُ\nبما تعملون خ\nباللِه ورسوِلِه والنوِ ر ال ِذي أنزلنا والله\n(فآ ِمنوا\n* (... اْل ِصير) : ُ\nإليِه اْل ِصيرُ (٨)) . ُ\nق وصوركم فأحسن صوركم و\nبالح\n(خلق السماوا ِت وألارض\nبئس اْل ِصيُر (٦٥)) . ُ\nر خاِل ِدين ِفيها و\nبآياِتنا أولِئك أصحاب النا\n(وال ِذين كفروا وكذبوا\n* (خاِل ِدين ِفيهُا أبدا - خاِل ِدين ِفيها) : ُ\nري ِمن تحِتها\nيئاِتِه ويد ِخله جنا ٍت تج\nباللِه ويعمل صاِلحا يك ِفر عنُه س\nن ومن يؤِمن\nع ذِلك يوم التغاب\nم الجم\n(يوم يجمعكم ِليو\nألانهار خاِل ِدين ِفيها أبدا ذِلك الفوز الع ِظيم (٩)) . ُ\nبئس اْل ِصير (٦٥)) .\nر خاِل ِدين ِفيها و\nبآياِتنا أولِئك أصحاب النا\n(وال ِذين كفروا وكذبوا\nجكم وأوالِدكم - أموالكم وأوالدكم) : ُ\n* (أزوا\nإن الله غفور رِحيم (٢٥))\nإن تعفوا وتصفحوا وتغ ِفروا ف\nجكمُ وأوالِدكمُ عدوا لكمُ فاحذروهم و\nإن ِمن أزوا\n(يا أيها ال ِذين آمُنوا\nإنما أموالكمُ وأوالدكمُ ِفتنةُ والله ِعنده أجر ع ِظيم (١٥)) . ُ"}, {"id": 64, "name": "الطلاق", "startPage": 262, "content": "متشاهبات سُورة\n* (واتقوا الله - فاتقوا الله) : ُ\nإال أن\nهن وال يخرجن\nرجوهن ِمن بيوِت\nهن وأحصوا ال ِعدة واتقوا الله ربكمُ ال تخ\nإذا طلقتم الِنساء فطِلقوهن ِل ِعدِت\n(يا أيها الن\nري لعل الله يح ِدث بعد ذِلك أمرا (٥)) . ُ\nين ٍة وِتلك حدود اللِه ومن يتعد حدود اللِه فقد ظلم نفسه ال تد\nبفا ِحش ٍة مب\nيُأِتين\nإليكم ِذكرا (٦٥)) . ُ\nب ال ِذين آمنوا قد أنزل الله\n(أعد الله لهم عذابا ش ِديدا فاتقوا اللهُ يا أوِلي ألاُلبا\n* (وِتلك حدود الل ِه - ذِلك أمر الل ِه ) : ُ\nإال أن\nهن وال يخرجن\nرجوهن ِمن بيوِت\nهن وأحصوا ال ِعدة واتقوا اللُه ربكم ال تخ\nإذا طلقتم الِنساء فطِلقوهن ِل ِعدِت\n(يا أيها الن\nري لعل الله يح ِدث بعد ذِلك أمرا (٥)) . ُ\nين ٍة وِتلك حدود اللِهُ ومن يتعد حدود اللِهُ فقد ظلم نفسه ال تد\nبفا ِحش ٍة مب\nيأِتين\nيئاِتِه ويع ِظم له أجرا (١)) . ُ\nق الله يك ِفر عنه س\nإليكم ومن يت\n(ذِلك أمر اللِهُ أنزله\n* (ومن يتق الله ... ) : ُ\nهدوا ذوي عد ٍل ِمنكم وأ ِقيموا الشهادة ِللِه ذِلكم يوعظ\nبمعرو ٍف وأش\nرقوهن\nبمعرو ٍف أو فا\nإذا بلغن أجلهن فأم ِسكوهن\nق اللهُ يجعل لهُ مخرجا (٢)) . ُ\nر ومن يت\nم آلاِخ\nباللِه واليو\nمن كان يؤِمن\nل أجلهن أن يضعن\nر والالِئي لم ي ِحضن وأوالت ألاحما\nن ارتبتم ف ِعدتهن ثالثة أشه\nض ِمن ِنساِئكم\n(والالِئي يِئسن ِمن اْل ِحي\nرِه يسرا (٢)) . ُ\nق اللهُ يجعل لهُ ِمن أم\nحملهن ومن يت\nيئاِتِه ويع ِظم له أجرا (١)) . ُ\nقُ اللهُ يك ِفر عنه س\nإليكم ومن يت\n(ذِلك أمر اللِه أنزله\nل - أوال ِت حم\n* (وأوالت ألاحما\nلُ أجلهن أن يضعن\nر والالِئي لم ي ِحضن وأُوالت ألاحما\nن ارتبتم ف ِعدتهن ثالثة أشه\nض ِمن ِنساِئكم\n(والالِئي يِئسن ِمن اْل ِحي\nرِه يسرا (٢)) . ُ\nق الله يجعل له ِمن أم\nحملهنُ ومن يت\nهن حتى يضعن\nإن كن أوال ِت حم ٍلُ فأُن ِفقوا علي\nهن و\nيقوا علي\n(أس ِكنوهن ِمن حيث سكنتم ِمن وج ِدكم وال تضاروهن ِلتض\nإن تعاسرتم فستر ِضع له أُخرى (٦)) . ُ\nبمعرو ٍف و\nإن أرضعن لكم فآتوهن أجورهن وأت ِمروا بينكم\nحملهنُ ف\n* ( ... يسرا) : ُ\nل أجلهن أن يضعن\nر والالِئي لم ي ِحضن وأوالت ألاحما\nن ارتبتم ف ِعدتهن ثالثة أشه\nض ِمن ِنساِئكم\n(والالِئي يِئسن ِمن اْل ِحي\nرِه يسرا (٢)) . ُ\nق الله يجعل له ِمن أم\nحملهن ومن يت\nإال ما آتاها سيجعل الله بعد عس\nرزقه فلين ِفق ِمما آتاه الله ال يكِلف الله نفسا\n(ِلين ِفق ذو سع ٍة ِمن سعِتِه ومن قُ ِدر عليِه\nيسرا (٢)) ُ"}, {"id": 65, "name": "التحريم", "startPage": 263, "content": "متشاهبات سُورة\n* (يا أيها ... ) : ُ\nجك والله غفور رِحيم (٥)) . ُ\nرم ما أحل الله لك تبت ِغُي مرضات أزوا\nبيُ ِلم تح\n(يا أيها الن\nبئس اْل ِصير (٩)) . ُ\nهم ومأواهم جهنم و\nبيُ جا ِه ِد الكفار واْلنا ِف ِقين واغلظ علي\n(يا أيها الن\n(يا أيها ال ِذين آمنوا قو  الذي) العلق 1 , اْلاعون 1 (\nبــــــــــــالتقوى ﴿٢٥﴾ أرأيــــــــــــت\nإن كــــــــــــان علــــــــــــى الهــــــــــــدى ﴿٥٥﴾ أو أمــــــــــــر\nإذا صــــــــــــلى ﴿٦٥﴾ أرأيــــــــــــتُ\n-أرأيــــــــــــت الــــــــــــ ِذي ينهَــــــــــــى ﴿٩﴾ عبــــــــــــدا\nكذب وتولى ﴿٨٥﴾ أُلم يعلم بأن اللـه يرى ﴿٢٥﴾ العلق\nن ﴿٨﴾ فويــــــــل ِللمصــــــــِلين\nم ا ِْلســــــــ ِكي\nن ﴿٥﴾ فــــــــذِلك الــــــــ ِذي يــــــــدع اليِتــــــــيم ﴿٢﴾ وال يحــــــــض علــــــــى طعــــــــا\nبالــــــــ ِدي\n-أرأيــــــــت الــــــــ ِذي يكــــــــ ِذب\n﴿٢﴾ اْلاعونُ\nإال الذين ءامنوا وعملوا الصالحات)الانشقاق 84 , التين 5 ,العصر 2 (\nإال ال ِذين آمنوا وع ِملوا الصاِلحا ِتُ لهم أجر غير ممنوٍن ﴿١٢﴾ الانشقاق\nبــــــــــأحكِم\nن ﴿٢﴾ ألــــــــــيس اللــــــــــه\nبالـــــــــ ِدي\nإال الـــــــــ ِذين آمنـــــــــوا وع ِملــــــــــوا الصـــــــــاِلحا ِتُ فلهــــــــــم أجـــــــــر غيـــــــــر ممنــــــــــ ُوٍن ﴿٦﴾ فمـــــــــا يكــــــــــ ِذبك بعـــــــــد\nالحاِك ِمين ﴿٣﴾ التين\nر ﴿٨﴾ العصر\nبالصب\nق وتواصوا\nبالح\nإال ال ِذين آمنوا وع ِملوا الصاِلحا ِتُ وتواصوا\nويل \"اْلطففين , الهمزة \" \"\nإذا كــــــــــــــــــالوهم أو وزنــــــــــــــــــوهم يخ ِســــــــــــــــــرون ﴿٨﴾\nس يســــــــــــــــــتوفون ﴿٢﴾ و\nإذا اكتــــــــــــــــــالوا علــــــــــــــــــى النــــــــــــــــــا\n-ويــــــــــــــــــلُ ِللمط ِف ِفــــــــــــــــــين ﴿٥﴾ الــــــــــــــــــ ِذين\nاْلطففين\nل همــــــــــزٍة ْلــــــــــزٍة ﴿٥﴾ الــــــــــ ِذي جمــــــــــع مــــــــــاال وعـــــــــــددهُ ﴿٢﴾ يحســــــــــب أن مالــــــــــه أخلــــــــــده ﴿٨﴾ كــــــــــالُ ًُ لينبــــــــــذن ِفــــــــــي الحطمـــــــــــ ِة\n-ويــــــــــلُ ِلكــــــــــ\n﴿٢﴾ وما أدراك ما الحطمة ﴿١﴾ الهمزة\nويل يومئذ للمكذبين (41 ) اْلطففين ُ\n)يومُ(.. (النبأ \\ النازعات \\ عبس\\ الانفطار \\ اْلطففين \\ القارعة ) ُ\nإال من أِذن له الرحمن وقال صوابا\n-يومُ ينفخ ِفي الصوِ ر فتأتون أفواجا (51) ... يوم يقوم الروح واْلالِئكة صفا ال يتكلمون\n(52)) النبأ.\nإلانسان ما سعى (82)) النازعات.\nجفة (5) ... يوم ي let currentChapterIdx = 0;
let currentSearchQuery = '';

// Build index
function buildIndex() {
  const grid = document.getElementById('indexGrid');
  grid.innerHTML = BOOK_DATA.map((ch, i) => `
    <div class="surah-card" id="card-${i}" onclick="openChapter(${i})">
      <div class="surah-num">${ch.id}</div>
      <span class="surah-name">${ch.name}</span>
      <div class="surah-page">ص ${ch.startPage}</div>
    </div>
  `).join('');
}

// Open chapter
function openChapter(idx) {
  currentChapterIdx = idx;
  const ch = BOOK_DATA[idx];
  
  // Update reader
  document.getElementById('readerSurahName').textContent = 'سورة ' + ch.name;
  
  // Format content
  const lines = ch.content.split('\n');
  let html = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (trimmed.startsWith('*')) {
      html += `<span class="section-header">${trimmed}</span>`;
    } else if (trimmed.startsWith('متشاه') || trimmed.startsWith('متشاب')) {
      // Skip book title lines
    } else {
      html += `<span class="verse-line">${escapeHtml(trimmed)}</span>\n`;
    }
  }
  
  // Highlight search if active
  if (currentSearchQuery) {
    const escaped = escapeRegex(currentSearchQuery);
    html = html.replace(new RegExp(escaped, 'g'), `<mark>${currentSearchQuery}</mark>`);
  }
  
  document.getElementById('bookContent').innerHTML = html;
  
  // Update nav buttons
  const prev = BOOK_DATA[idx - 1];
  const next = BOOK_DATA[idx + 1];
  document.getElementById('prevBtn').disabled = !prev;
  document.getElementById('nextBtn').disabled = !next;
  if (prev) document.getElementById('prevName').textContent = prev.name;
  if (next) document.getElementById('nextName').textContent = next.name;
  
  // Update active card
  document.querySelectorAll('.surah-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + idx);
  if (card) card.classList.add('active');
  
  showPanel('reader');
  window.scrollTo(0,0);
}

function navigateSurah(dir) {
  const next = currentChapterIdx + dir;
  if (next >= 0 && next < BOOK_DATA.length) {
    openChapter(next);
  }
}

// Search
function handleSearchInput(val) {
  if (val.trim().length >= 2) {
    doSearch(val.trim());
  }
}

function doSearch(query) {
  query = query || document.getElementById('searchInput').value.trim();
  if (!query || query.length < 2) return;
  
  currentSearchQuery = query;
  
  const results = [];
  for (let i = 0; i < BOOK_DATA.length; i++) {
    const ch = BOOK_DATA[i];
    if (ch.content.includes(query) || ch.name.includes(query)) {
      // Find matching lines
      const lines = ch.content.split('\n');
      const matchLines = lines.filter(l => l.includes(query)).slice(0, 3);
      results.push({
        idx: i,
        name: ch.name,
        matches: matchLines
      });
    }
  }
  
  // Update search tab
  const countEl = document.getElementById('resultsCount');
  const resultsEl = document.getElementById('searchResults');
  
  if (results.length === 0) {
    countEl.textContent = `لا توجد نتائج لـ "${query}"`;
    resultsEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>جرّب كلمة أخرى</p></div>`;
  } else {
    countEl.textContent = `وُجد ${results.length} سورة تحتوي على "${query}"`;
    resultsEl.innerHTML = results.map(r => `
      <div class="result-card" onclick="openChapterWithSearch(${r.idx})">
        <div class="result-surah">سورة ${r.name}</div>
        <div class="result-excerpt">${
          r.matches.map(m => {
            const escaped = escapeRegex(query);
            return m.replace(new RegExp(escaped, 'g'), `<mark>${query}</mark>`);
          }).join('<br>')
        }</div>
      </div>
    `).join('');
  }
  
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===2));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-search').classList.add('active');
}

function openChapterWithSearch(idx) {
  openChapter(idx);
}

// Panel switcher
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  
  const tabMap = { index: 0, reader: 1, search: 2 };
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', i === tabMap[name]);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Init
buildIndex();
